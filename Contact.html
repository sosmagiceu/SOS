<!DOCTYPE html>
<html lang="en">
<head>

<meta property="og:title" content="S.O.S. Magic Tarot Experience">
<meta property="og:description" content="Explore the S.O.S. Magic tarot deck and receive a powerful digital reading.">
<meta property="og:type" content="website">

<meta name="description" content="Discover the S.O.S. Magic tarot deck and unlock your personal digital reading. Step into clarity, insight, and guidance designed to reveal what lies ahead.">
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact – SOS Magic</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <link href="/assets/css/main.css" rel="stylesheet"/>
  <link href="/assets/css/header.css" rel="stylesheet"/>
  <link href="/assets/css/pages/contact.css" rel="stylesheet"/>

  <script defer src="/assets/js/vendor/tooplate-2144-parallax-scripts.js"></script>
  <script defer src="/assets/js/header.js"></script>
  <script defer src="/assets/js/footer.js"></script>
</head>
<body data-page="contact">
  <div id="header-mount"></div>

  <main class="contact-page">
    <section id="section-1" class="contact-section">
      <div class="contact-hero">
        <div class="contact-kicker">
          <h1 class="contact-title">
            <span class="contact-line" data-text="Contact us">Contact us</span>
          </h1>
        </div>

        <p class="contact-text">
          Most frequently asked questions can be found in our FAQ.
        </p>

        <div class="contact-actions">
          <a class="contact-cta" href="FAQ.html">Go to FAQ</a>
        </div>

        <p class="contact-text contact-form-note">
          If you still have questions, fill in the form below to contact us.
        </p>
      </div>

      <form class="contact-form-card" id="contact-form" method="post" novalidate>
        <div class="contact-field-grid">
          <div class="contact-field">
            <label class="contact-label" for="contact-name">Name</label>
            <input class="contact-input" id="contact-name" name="name" type="text" placeholder="Your name" required/>
          </div>

          <div class="contact-field">
            <label class="contact-label" for="contact-email">Email</label>
            <input class="contact-input" id="contact-email" name="email" type="email" placeholder="Your email" required/>
          </div>
        </div>

        <div class="contact-field">
          <label class="contact-label" for="contact-subject">Subject</label>
          <input class="contact-input" id="contact-subject" name="subject" type="text" placeholder="Subject" required/>
        </div>

        <div class="contact-field">
          <label class="contact-label" for="contact-message">Message</label>
          <textarea class="contact-input contact-textarea" id="contact-message" name="message" placeholder="Your message" required></textarea>
        </div>

        <p class="contact-status" id="contact-status" aria-live="polite"></p>

        <button class="contact-cta contact-submit" id="contact-submit" type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <div id="footer-mount"></div>

  <script>
    const contactForm = document.getElementById("contact-form");
    const contactStatus = document.getElementById("contact-status");
    const contactSubmit = document.getElementById("contact-submit");

    contactForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!contactForm.checkValidity()) {
        contactForm.reportValidity();
        return;
      }

      contactStatus.textContent = "";
      contactStatus.className = "contact-status";
      contactSubmit.disabled = true;
      contactSubmit.textContent = "Sending...";

      const payload = {
        name: contactForm.name.value.trim(),
        email: contactForm.email.value.trim(),
        subject: contactForm.subject.value.trim(),
        message: contactForm.message.value.trim()
      };

      try {
        const response = await fetch("/.netlify/functions/contact", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json().catch(() => ({}));

        if (!response.ok || !result.ok) {
          throw new Error(result.error || "Unable to send message.");
        }

        contactForm.reset();
        contactStatus.textContent = "Your message has been send to us. Please also check your Spam folder";
        contactStatus.classList.add("is-success");
      } catch (error) {
        contactStatus.textContent = "Something went wrong. Please try again.";
        contactStatus.classList.add("is-error");
      } finally {
        contactSubmit.disabled = false;
        contactSubmit.textContent = "Send Message";
      }
    });
  </script>
</body>
</html>
