<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact – SOS Magic</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <link href="/assets/css/main.css" rel="stylesheet"/>
  <link href="/assets/css/header.css" rel="stylesheet"/>
  <link href="/assets/css/pages/contact.css" rel="stylesheet"/>

  <script defer src="/assets/js/vendor/tooplate-2144-parallax-scripts.js"></script>
  <script defer src="/assets/js/header.js"></script>
  <script defer src="/assets/js/footer.js"></script>
</head>
<body data-page="contact">
  <div id="header-mount"></div>

  <main class="contact-page">
    <section id="section-1" class="contact-section">
      <div class="contact-hero">
        <div class="contact-kicker">
          <span class="contact-line-mid" data-text="Contact us">Contact us</span>
        </div>

        <p class="contact-text">
          Most frequently asked questions can be found in our FAQ.
        </p>

        <div class="contact-actions">
          <a class="contact-cta" href="FAQ.html">Go to FAQ</a>
        </div>

        <p class="contact-text contact-form-note">
          If you still have questions, fill in the form below to contact us.
        </p>
      </div>

      <form class="contact-form-card" action="#" method="post">
        <div class="contact-field-grid">
          <div class="contact-field">
            <label class="contact-label" for="contact-name">Name</label>
            <input class="contact-input" id="contact-name" name="name" type="text" placeholder="Your name" required/>
          </div>

          <div class="contact-field">
            <label class="contact-label" for="contact-email">Email</label>
            <input class="contact-input" id="contact-email" name="email" type="email" placeholder="Your email" required/>
          </div>
        </div>

        <div class="contact-field">
          <label class="contact-label" for="contact-subject">Subject</label>
          <input class="contact-input" id="contact-subject" name="subject" type="text" placeholder="Subject" required/>
        </div>

        <div class="contact-field">
          <label class="contact-label" for="contact-message">Message</label>
          <textarea class="contact-input contact-textarea" id="contact-message" name="message" placeholder="Your message" required></textarea>
        </div>

        <button class="contact-cta contact-submit" type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <div id="footer-mount"></div>
</body>
</html>
