<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reviews – SOS Magic</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <link href="/assets/css/main.css" rel="stylesheet"/>
  <link href="/assets/css/header.css" rel="stylesheet"/>
  <link href="/assets/css/pages/reviews.css" rel="stylesheet"/>

  <script defer src="/assets/js/vendor/tooplate-2144-parallax-scripts.js"></script>
  <script defer src="/assets/js/header.js"></script>
  <script defer src="/assets/js/footer.js"></script>
</head>
<body data-page="reviews">
  <div id="header-mount"></div>

  <main class="reviews-page">
    <section id="section-1" class="reviews-section">
      <div class="reviews-hero">
        <div class="reviews-kicker">
          <h1 class="reviews-title">
            <span class="reviews-line" data-text="Reviews">Reviews</span>
          </h1>
        </div>

        <div class="reviews-average-wrap" aria-label="Average rating">
          <div class="reviews-average-stars" id="reviews-average-stars" aria-hidden="true">★★★★★</div>
        </div>
      </div>

      <section class="reviews-block">
        <div class="reviews-block-heading">
          <h2 class="reviews-breathing-title">Leave a review</h2>
        </div>

        <form id="review-form" class="reviews-form-card">
          <div class="reviews-field">
            <label class="reviews-label" for="review-name">Name</label>
            <input
              class="reviews-input"
              id="review-name"
              name="name"
              type="text"
              placeholder="Your name"
              required
            />
          </div>

          <div class="reviews-field">
            <label class="reviews-label" for="review-message">Message</label>
            <textarea
              class="reviews-input reviews-textarea"
              id="review-message"
              name="message"
              placeholder="Your review"
              required
            ></textarea>
          </div>

          <div class="reviews-field reviews-score-field">
            <label class="reviews-label" for="review-score">Score</label>
            <select
              class="reviews-input reviews-select"
              id="review-score"
              name="score"
              required
            >
              <option value="">Select stars</option>
              <option value="5">5 stars</option>
              <option value="4">4 stars</option>
              <option value="3">3 stars</option>
              <option value="2">2 stars</option>
              <option value="1">1 star</option>
            </select>
          </div>

          <button class="reviews-cta reviews-submit" type="submit">Send Review</button>
          <p id="review-form-status" class="reviews-form-status" aria-live="polite"></p>
        </form>
      </section>

      <section class="reviews-block">
        <div class="reviews-block-heading">
          <h2 class="reviews-breathing-title">Current reviews</h2>
        </div>

        <div id="reviews-list" class="reviews-list"></div>

        <div id="reviews-empty" class="reviews-empty" hidden>
          No reviews yet.
        </div>

        <div class="reviews-pagination" id="reviews-pagination" hidden>
          <button type="button" class="reviews-page-btn" id="reviews-prev">Previous</button>
          <div class="reviews-page-info" id="reviews-page-info">Page 1 of 1</div>
          <button type="button" class="reviews-page-btn" id="reviews-next">Next</button>
        </div>
      </section>
    </section>
  </main>

  <div id="footer-mount"></div>

  <script>
    (() => {
      const form = document.getElementById("review-form");
      const statusEl = document.getElementById("review-form-status");
      const reviewsList = document.getElementById("reviews-list");
      const reviewsEmpty = document.getElementById("reviews-empty");
      const reviewsPagination = document.getElementById("reviews-pagination");
      const reviewsPrev = document.getElementById("reviews-prev");
      const reviewsNext = document.getElementById("reviews-next");
      const reviewsPageInfo = document.getElementById("reviews-page-info");
      const averageStars = document.getElementById("reviews-average-stars");

      let currentPage = 1;
      let totalPages = 1;

      function starString(score) {
        const rounded = Math.round(Number(score) || 0);
        return "★".repeat(Math.max(0, Math.min(5, rounded))) + "☆".repeat(Math.max(0, 5 - Math.max(0, Math.min(5, rounded))));
      }

      function renderAverageStars(score) {
        const safeScore = Math.max(0, Math.min(5, Number(score) || 0));
        const full = Math.floor(safeScore);
        const half = safeScore - full >= 0.5 ? 1 : 0;
        const empty = 5 - full - half;

        averageStars.innerHTML =
          '<span class="is-filled">' + "★".repeat(full) + '</span>' +
          (half ? '<span class="is-half">★</span>' : "") +
          '<span class="is-empty">' + "☆".repeat(empty) + '</span>';
      }

      function renderReviews(items) {
        reviewsList.innerHTML = "";

        if (!items || !items.length) {
          reviewsEmpty.hidden = false;
          return;
        }

        reviewsEmpty.hidden = true;

        items.forEach((review) => {
          const article = document.createElement("article");
          article.className = "review-card";

          article.innerHTML = `
            <div class="review-card-top">
              <h3 class="review-card-name"></h3>
              <div class="review-card-stars" aria-label="${Number(review.score)} out of 5 stars">${starString(review.score)}</div>
            </div>
            <p class="review-card-message"></p>
          `;

          article.querySelector(".review-card-name").textContent = review.name;
          article.querySelector(".review-card-message").textContent = review.message;

          reviewsList.appendChild(article);
        });
      }

      async function loadReviews(page = 1) {
        try {
          const res = await fetch(`/.netlify/functions/get-reviews?page=${page}`);
          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || "Failed to load reviews");
          }

          renderAverageStars(data.average_score || 0);
          renderReviews(data.reviews || []);

          currentPage = data.page || 1;
          totalPages = data.total_pages || 1;

          reviewsPageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
          reviewsPrev.disabled = currentPage <= 1;
          reviewsNext.disabled = currentPage >= totalPages;
          reviewsPagination.hidden = totalPages <= 1;
        } catch (err) {
          reviewsList.innerHTML = "";
          reviewsEmpty.hidden = false;
          reviewsEmpty.textContent = "Could not load reviews.";
          reviewsPagination.hidden = true;
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        statusEl.textContent = "Sending...";
        statusEl.classList.remove("is-error", "is-success");

        const data = {
          name: form.name.value.trim(),
          message: form.message.value.trim(),
          score: parseInt(form.score.value, 10)
        };

        try {
          const res = await fetch("/.netlify/functions/submit-review", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
          });

          const result = await res.json();

          if (!res.ok) {
            throw new Error(result.error || "Something went wrong");
          }

          form.reset();
          statusEl.textContent = "Your review has been sent to us.";
          statusEl.classList.add("is-success");
        } catch (err) {
          statusEl.textContent = err.message || "Something went wrong. Please try again.";
          statusEl.classList.add("is-error");
        }
      });

      reviewsPrev.addEventListener("click", () => {
        if (currentPage > 1) {
          loadReviews(currentPage - 1);
        }
      });

      reviewsNext.addEventListener("click", () => {
        if (currentPage < totalPages) {
          loadReviews(currentPage + 1);
        }
      });

      loadReviews(1);
    })();
  </script>
</body>
</html>
